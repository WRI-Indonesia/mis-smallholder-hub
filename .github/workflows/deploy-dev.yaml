name: Deploy Dev

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: STAGING_ENV_MIS_SMALLHOLDER

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT }}
          script: |
            set -e

            cd ~/mis-smallholder-hub-dev
            git fetch origin
            git checkout dev
            git reset --hard origin/dev

            cat > ~/mis-smallholder-hub-dev/.env.production <<'EOF'
            ${{ secrets.MIS_DEV_ENV }}
            EOF
            chmod 600 ~/mis-smallholder-hub-dev/.env.production

            cat > ~/.env <<'EOF'
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            EOF
            chmod 600 ~/.env

            cd ~
            podman-compose build mis-smallholder-dev
            podman-compose up -d --no-deps mis-smallholder-dev
