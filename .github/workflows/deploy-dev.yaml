name: Deploy Dev

on:
  push:
    branches: [dev]

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: STAGING_ENV_MIS_SMALLHOLDER
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Deploy on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT }}
          command_timeout: 45m
          script: |
            set -Eeuo pipefail

            # 1. Update repository
            echo "Updating repository..."
            cd ~/mis-smallholder-hub-dev
            git fetch origin
            git checkout dev
            git reset --hard origin/dev

            # 2. Update .env files for the specific dev directory
            echo "Updating environment variables..."
            cat > .env <<'EOF'
            ${{ secrets.MIS_DEV_ENV }}
            EOF
            cat > .env.production <<'EOF'
            ${{ secrets.MIS_DEV_ENV }}
            EOF
            chmod 600 .env
            chmod 600 .env.production

            # 3. Build and recreate container on the VM
            echo "Building image..."
            cd ~
            podman-compose build mis-smallholder-dev

            echo "Restarting container..."
            podman-compose up -d --no-deps --force-recreate mis-smallholder-dev

            # 4. Refresh Nginx 
            echo "Cleaning up and reloading Nginx..."
            podman-compose restart nginx
