name: Deploy Dev

on:
  push:
    branches:
      - dev

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: STAGING_ENV_MIS_SMALLHOLDER
    timeout-minutes: 20

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT }}
          timeout: 60s
          command_timeout: 45m
          script: |
            set -Eeuo pipefail

            # CD
            cd /var/www/html/mis-dev

            # Pull
            git fetch origin
            git checkout dev
            git reset --hard origin/dev

            # ENV
            # Note: We use .env here as Next.js picks it up by default
            cat > .env <<'EOF'
            ${{ secrets.MIS_DEV_ENV }}
            EOF
            chmod 600 .env

            # Build 
            npm install
            npx prisma generate
            npm run build

            #Reload
            pm2 reload mis-dev || pm2 start npm --name "mis-dev" -- start -- -p 3001