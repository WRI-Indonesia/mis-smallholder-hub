name: Deploy Dev

on:
  push:
    branches:
      - dev

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: DEV_ENV_MIS_SMALLHOLDER
    timeout-minutes: 20

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEV_SSH_PORT }}
          timeout: 60s
          command_timeout: 45m
          script: |
            set -Eeuo pipefail

            # LOAD NVM
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # CD
            cd /var/www/html/mis-dev

            # PULL
            git fetch origin
            git checkout dev
            git reset --hard origin/dev

            # ENV
            cat > .env <<'EOF'
            ${{ secrets.MIS_DEV_ENV }}
            EOF
            chmod 600 .env

            # BUILD
            npm install
            npx prisma generate
            npm run build

            # RELOAD
            pm2 reload mis-dev || pm2 start npm --name "mis-dev" -- start -- -p 3001