name: Deploy Dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: STAGING_ENV_MIS_SMALLHOLDER
    timeout-minutes: 20

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT }}
          script: |
            set -Eeuo pipefail

            cd ~/mis-smallholder-hub-dev
            git fetch origin
            git checkout dev
            git reset --hard origin/dev

            cat > ~/mis-smallholder-hub-dev/.env.production <<'EOF'
            ${{ secrets.MIS_DEV_ENV }}
            EOF
            chmod 600 ~/mis-smallholder-hub-dev/.env.production

            cat > ~/mis-smallholder-hub-dev/.env.development <<'EOF'
            ${{ secrets.MIS_DEV_ENV }}
            EOF
            chmod 600 ~/mis-smallholder-hub-dev/.env.development

            cat > ~/.env <<'EOF'
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            EOF
            chmod 600 ~/.env

            cd ~
            podman-compose build --no-cache mis-smallholder-dev
            podman-compose up -d --no-deps --force-recreate mis-smallholder-dev
