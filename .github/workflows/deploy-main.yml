name: Deploy Main

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: MAIN_ENV_MIS_SMALLHOLDER

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.MAIN_HOST }}
          username: ${{ secrets.MAIN_SSH_USER }}
          key: ${{ secrets.MAIN_SSH_PRIVATE_KEY }}
          port: ${{ secrets.MAIN_SSH_PORT }}
          script: |
            set -e

            cd ~/mis-smallholder-hub
            git fetch origin
            git checkout main
            git reset --hard origin/main

            cat > ~/mis-smallholder-hub/.env.production <<'EOF'
            ${{ secrets.MIS_MAIN_ENV }}
            EOF
            chmod 600 ~/mis-smallholder-hub/.env.production

            cd ~
            podman-compose build mis-smallholder-main
            podman-compose up -d --no-deps mis-smallholder-main
